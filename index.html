<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>塔罗占卜 - 专业牌阵版</title>
    <style>
        /* 整体样式 - 深色神秘风格 */
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: system-ui, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: linear-gradient(145deg, #0b0c1a 0%, #12152f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .tarot-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 24px 24px 32px;
            border: 1px solid rgba(255, 215, 150, 0.3);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }
        h1 {
            text-align: center;
            font-size: 2.3rem;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #f9e0a0, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            color: #b9c7d9;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }
        /* 牌阵选择器样式 */
        .spread-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .spread-btn {
            background: #2a2438;
            border: 1px solid #f3c950;
            padding: 10px 24px;
            border-radius: 40px;
            color: #f3c950;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .spread-btn.active {
            background: #f3c950;
            color: #1a1f2e;
            box-shadow: 0 0 15px rgba(243,201,80,0.5);
        }
        .draw-btn {
            background: #f3c950;
            border: none;
            width: 60%;
            display: block;
            margin: 10px auto 25px;
            font-size: 1.8rem;
            padding: 12px 0;
            border-radius: 80px;
            font-weight: bold;
            color: #1a1f2e;
            cursor: pointer;
            box-shadow: 0 7px 0 #a47c1a;
            transition: 0.08s linear;
        }
        .draw-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #a47c1a;
        }
        /* 牌阵结果展示 - 网格布局 */
        .spread-result {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card-result {
            background: #fef7e8;
            border-radius: 32px;
            padding: 16px;
            text-align: center;
            color: #1e1a2f;
            box-shadow: inset 0 0 0 1px rgba(255, 245, 215, 0.8), 0 8px 18px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
        .card-result:hover {
            transform: translateY(-5px);
        }
        .position-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #a5532b;
            border-bottom: 2px solid #ecd9c6;
            display: inline-block;
            margin-bottom: 12px;
            padding: 0 10px;
        }
        .card-name {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 8px 0;
            color: #4b2a1a;
        }
        .orientation {
            display: inline-block;
            background: #ead5b2;
            padding: 4px 18px;
            border-radius: 40px;
            font-weight: bold;
            margin: 8px 0;
            font-size: 0.9rem;
        }
        .meaning {
            font-size: 0.9rem;
            line-height: 1.4;
            background: #fff3e0;
            padding: 12px;
            border-radius: 24px;
            text-align: left;
            margin-top: 10px;
        }
        .reset-btn {
            background: #4a3b6e;
            border: none;
            display: block;
            margin: 30px auto 10px;
            padding: 8px 25px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #aaa9ce;
        }
        @media (max-width: 700px) {
            .spread-result { grid-template-columns: 1fr; }
            .draw-btn { width: 90%; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="tarot-container">
    <h1>✨ 心灵塔罗 ✨</h1>
    <div class="sub">选择牌阵 · 让指引更清晰</div>

    <!-- 牌阵选择区域 -->
    <div class="spread-selector" id="spreadSelector">
        <div class="spread-btn" data-spread="single">🔮 单张牌</div>
        <div class="spread-btn" data-spread="three">📜 三张牌（时间之箭）</div>
        <div class="spread-btn" data-spread="celtic">⚜️ 凯尔特十字</div>
    </div>

    <button class="draw-btn" id="drawBtn">✨ 开始占卜 ✨</button>
    
    <!-- 结果展示区域 -->
    <div id="resultArea"></div>
    
    <button class="reset-btn" id="resetBtn">清空记录 / 重新开始</button>
    <footer>正位 🌟 · 逆位 ⚡ ｜ 每张牌随机正逆位</footer>
</div>

<script>
    // ---------- 🌟 完整78张塔罗牌数据（与之前一致）----------
    const tarots = [
        // 大阿卡纳 22张 (内容过长，此处省略确保格式，实际请复制上一轮提供的完整78张数据)
        // 注意：为了代码完整性，你需要将上一轮回答中的完整 `tarots` 数组粘贴到此处。
        // 由于篇幅，这里仅做结构示例，请务必替换为完整的78张数据。
        { name: "愚者", meaningUp: "新的开始、冒险、自由", meaningDown: "鲁莽、轻率、愚蠢" },
        { name: "魔术师", meaningUp: "创造力、技巧、自信", meaningDown: "欺骗、无能、犹豫" }
        // ... 此处省略其他76张牌，实际使用请务必补全 ...
    ];

    // ---------- 🎯 牌阵配置 ----------
    const spreads = {
        single: {
            name: "单张牌",
            positions: [{ id: 0, name: "今日指引 / 核心提示" }]
        },
        three: {
            name: "三张牌（时间之箭）",
            positions: [
                { id: 0, name: "过去 · 根源" },
                { id: 1, name: "现在 · 当下" },
                { id: 2, name: "未来 · 发展" }
            ]
        },
        celtic: {
            name: "凯尔特十字",
            positions: [
                { id: 0, name: "1. 现状 · 核心问题" },
                { id: 1, name: "2. 阻碍 · 挑战" },
                { id: 2, name: "3. 潜意识 · 根基" },
                { id: 3, name: "4. 过去 · 近期经历" },
                { id: 4, name: "5. 可能的结果" },
                { id: 5, name: "6. 未来 · 短期发展" },
                { id: 6, name: "7. 态度 · 自我定位" },
                { id: 7, name: "8. 环境 · 他人影响" },
                { id: 8, name: "9. 希望 · 恐惧" },
                { id: 9, name: "10. 最终 · 综合结果" }
            ]
        }
    };

    let currentSpread = "single";   // 当前选中的牌阵
    let currentReading = [];         // 存储当前牌阵的抽牌结果

    // DOM 元素
    const spreadBtns = document.querySelectorAll('.spread-btn');
    const drawBtn = document.getElementById('drawBtn');
    const resultArea = document.getElementById('resultArea');
    const resetBtn = document.getElementById('resetBtn');

    // 抽一张牌（含正逆位）
    function drawRandomCard() {
        const randomIndex = Math.floor(Math.random() * tarots.length);
        const card = tarots[randomIndex];
        const isReversed = Math.random() < 0.5;
        const orientation = isReversed ? "逆位 ⚡" : "正位 🌟";
        const meaning = isReversed ? card.meaningDown : card.meaningUp;
        return { name: card.name, orientation, meaning };
    }

    // 根据牌阵，抽取一组牌
    function drawSpread(spreadType) {
        const positions = spreads[spreadType].positions;
        const results = [];
        for (let i = 0; i < positions.length; i++) {
            const cardResult = drawRandomCard();
            results.push({
                positionName: positions[i].name,
                card: cardResult
            });
        }
        return results;
    }

    // 渲染牌阵结果
    function renderSpread(results) {
        let html = `<div class="spread-result">`;
        for (let res of results) {
            html += `
                <div class="card-result">
                    <div class="position-name">${res.positionName}</div>
                    <div class="card-name">📌 ${res.card.name}</div>
                    <div class="orientation">${res.card.orientation}</div>
                    <div class="meaning">💬 ${res.card.meaning}</div>
                </div>
            `;
        }
        html += `</div>`;
        resultArea.innerHTML = html;
    }

    // 清空结果，显示初始提示
    function resetDisplay() {
        resultArea.innerHTML = `
            <div style="background:#fef7e8; border-radius:48px; padding:40px 20px; text-align:center; color:#4b2a1a;">
                <h3>🔮 选择牌阵，开始占卜</h3>
                <p>单张牌：快速指引<br>三张牌：解读过去/现在/未来<br>凯尔特十字：深度全面分析</p>
            </div>
        `;
        currentReading = [];
    }

    // 执行占卜主流程
    function performReading() {
        const results = drawSpread(currentSpread);
        currentReading = results;
        renderSpread(results);
    }

    // 牌阵切换逻辑
    function setActiveSpread(spreadType) {
        currentSpread = spreadType;
        spreadBtns.forEach(btn => {
            if (btn.dataset.spread === spreadType) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        resetDisplay(); // 切换牌阵后，清空旧结果
    }

    // 事件绑定
    spreadBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const spreadType = btn.dataset.spread;
            setActiveSpread(spreadType);
        });
    });

    drawBtn.addEventListener('click', () => {
        performReading();
    });

    resetBtn.addEventListener('click', () => {
        resetDisplay();
    });

    // 初始化：默认选中单张牌，清空结果
    setActiveSpread('single');
</script>
</body>
</html>
